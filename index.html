<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Registration</title>
</head>

<body style="font-family:Arial,sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">

<div style="background:#fff; padding:30px 40px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.15); width:340px; text-align:center;">

<h2 style="color:#333;">Event Registration</h2>

<form id="registrationForm">

<label for="name" style="display:block; margin-top:12px; font-weight:bold; color:#444; text-align:left;">
Full Name
</label>

<input type="text" id="name" required
style="width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">

<label for="email" style="display:block; margin-top:12px; font-weight:bold; color:#444; text-align:left;">
Email
</label>

<input type="email" id="email" required
style="width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">

<label for="phone" style="display:block; margin-top:12px; font-weight:bold; color:#444; text-align:left;">
Phone Number
</label>

<input type="tel" id="phone" pattern="[0-9]{10}" required
style="width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">

<label for="event" style="display:block; margin-top:12px; font-weight:bold; color:#444; text-align:left;">
Select Event
</label>

<select id="event"
style="width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
    <option>Tech Talk</option>
    <option>Workshop</option>
    <option>Hackathon</option>
</select>

<button type="submit"
style="margin-top:20px; width:100%; padding:10px; background:#4CAF50; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;">
Register
</button>

<p id="errorMsg" style="color:red; margin-top:8px; font-weight:bold;"></p>

</form>

</div>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const event = document.getElementById("event").value;

    if(name==="" || email==="" || phone===""){
        document.getElementById("errorMsg").textContent="Please fill all fields correctly.";
        return;
    }

    const params=new URLSearchParams({name,email,event});
    window.location.href="success.html?"+params.toString();
});
</script>

</body>
</html>
